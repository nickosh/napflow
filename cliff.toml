# git-cliff configuration (NFR-11).
# CHANGELOG.md is generated, never hand-edited:
#   uvx git-cliff -o CHANGELOG.md            # regenerate (Unreleased included)
#   uvx git-cliff --tag v0.1.0 -o CHANGELOG.md   # at release time

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
protect_breaking_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"
# HTML-comment prefixes order the groups; striptags removes them on render.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^perf|^refactor", group = "<!-- 2 -->Changed" },
  { message = "^revert", group = "<!-- 3 -->Removed" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test|^chore|^ci|^build|^style", group = "<!-- 5 -->Internal" },
]
