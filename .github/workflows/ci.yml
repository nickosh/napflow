name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      # setup-uv publishes no moving major tag — pin the exact release
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install project
        run: uv sync --locked
      - name: Format check
        run: uv run ruff format --check
      - name: Lint
        run: uv run ruff check
      - name: Import contracts (NFR-01)
        run: uv run lint-imports
      - name: Tests
        run: uv run pytest

  # S4: build the UI, prove the wheel carries it (NFR-03), then drive
  # the served bundle with Playwright — the suite grows per milestone
  # (PLAN S4). Node is CI/dev-only; users install one wheel.
  ui:
    name: ui e2e (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20 # a hung browser install must not burn hours
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # active LTS; engines floor stays >=22.12 (Vite 8)
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install project
        run: uv sync --locked
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui
      - name: Audit frontend notices
        run: uv run python tools/generate_frontend_notices.py --check
      - name: Vitest
        run: npm test
        working-directory: ui
      - name: Build UI bundle
        run: npm run build
        working-directory: ui
      - name: Release artifacts carry the bundle (NFR-03)
        shell: bash
        run: |
          uv build --clear
          uv run python - <<'EOF'
          import glob, sys, zipfile
          names = zipfile.ZipFile(glob.glob("dist/*.whl")[0]).namelist()
          ok = any(n == "napflow/server/static/index.html" for n in names)
          sys.exit(0 if ok else "wheel is missing the UI bundle (NFR-03)")
          EOF
      - name: Installed release-artifact smoke
        if: runner.os == 'Linux'
        run: uv run python tools/smoke_release_artifact.py dist
      # --with-deps is Linux-only (apt libraries). On Windows it tries
      # to install media components via an elevated path and hangs on
      # hosted runners; macOS/Windows runners need just the browser.
      - name: Install Playwright chromium
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install chromium
          fi
        working-directory: ui
      - name: Playwright e2e
        run: npm run e2e
        working-directory: ui
      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ matrix.os }}
          path: |
            ui/playwright-report
            ui/test-results
          if-no-files-found: ignore

  # Called by release.yml on tags so the exact PR-quality workflow is the
  # publication gate. Development checkpoints may pass ordinary CI but can
  # never pass this release-specific refusal.
  release-version:
    name: release version
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Refuse tag/package mismatch and development releases
        run: >-
          uv run --no-project --python 3.12 python
          tools/check_release_version.py --tag "${{ github.ref_name }}"

  # NFR-10: niquests pulls urllib3-future — napflow.core gets installed
  # into users' pytest envs next to requests/botocore; that combination
  # must keep working or the "importable pytest surface" promise breaks.
  compat:
    name: dependency compat (requests + botocore)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install napflow alongside requests + botocore
        run: |
          uv venv
          uv pip install . requests botocore pytest
      - name: Import both HTTP stacks side by side, then run the suite
        run: |
          uv run --no-sync python -c "import requests, botocore, niquests, napflow.core"
          uv run --no-sync pytest
