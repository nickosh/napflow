name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - name: Install project
        run: uv sync --locked
      - name: Format check
        run: uv run ruff format --check
      - name: Lint
        run: uv run ruff check
      - name: Import contracts (NFR-01)
        run: uv run lint-imports
      - name: Tests
        run: uv run pytest
