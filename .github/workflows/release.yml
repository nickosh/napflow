name: Release

# Tag-driven (docs/RELEASING.md). `workflow_dispatch` is the dry-run
# path: full gate + build + artifact checks, no publish, no Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff needs full history for notes
      # setup-uv publishes no moving major tag — pin the exact release
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Tag matches package version (hard gate, RELEASING.md)
        if: github.ref_type == 'tag'
        run: |
          v="$(uv run --no-project --python 3.12 python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "v$v" != "$GITHUB_REF_NAME" ]; then
            echo "::error::pyproject.toml version '$v' does not match tag '$GITHUB_REF_NAME'"
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # active LTS; engines floor stays >=22.12 (Vite 8)
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Gate
        run: |
          uv sync --locked
          uv run ruff check
          uv run lint-imports
          uv run pytest
      - name: Build UI bundle (ships inside the wheel, NFR-03)
        run: |
          npm ci
          npm run build
        working-directory: ui
      - name: Build sdist + wheel
        run: uv build
      - name: Artifacts carry the bundle (NFR-03)
        run: |
          uv run python - <<'EOF'
          import glob, sys, zipfile
          names = zipfile.ZipFile(glob.glob("dist/*.whl")[0]).namelist()
          ok = any(n == "napflow/server/static/index.html" for n in names)
          sys.exit(0 if ok else "wheel is missing the UI bundle (NFR-03)")
          EOF
      - name: Release notes for this tag
        if: github.ref_type == 'tag'
        run: uvx git-cliff --latest --strip header -o RELEASE_NOTES.md
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
      - uses: actions/upload-artifact@v7
        if: github.ref_type == 'tag'
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # Trusted publishing (OIDC): PyPI trusts this repo+workflow+environment,
  # no API tokens anywhere. Isolated job so only it holds id-token: write
  # and no build/test code runs next to the publish credential.
  pypi:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/napflow/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      # pinned exact like setup-uv; bump deliberately
      - uses: pypa/gh-action-pypi-publish@v1.14.0

  # After PyPI on purpose: a failed publish must not leave a public
  # Release page implying the version is installable.
  github-release:
    if: github.ref_type == 'tag'
    needs: [build, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: release-notes
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # every v0.x is experimental (D33) — mark it a pre-release
          case "$GITHUB_REF_NAME" in
            v0.*) prerelease="--prerelease" ;;
            *) prerelease="" ;;
          esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            $prerelease
