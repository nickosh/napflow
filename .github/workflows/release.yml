name: Release

# Tag-driven (docs/RELEASING.md). `workflow_dispatch` is the dry-run
# path: full gate + build + artifact checks, no publish, no Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Reuse the same required Python/UI/compat jobs as pull requests. The called
  # workflow comes from this exact ref, including its tested release refusal.
  gate:
    uses: ./.github/workflows/ci.yml

  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # git-cliff needs full history for notes
      # setup-uv publishes no moving major tag — pin the exact release
      - uses: astral-sh/setup-uv@v8.2.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # active LTS; engines floor stays >=22.12 (Vite 8)
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui
      - name: Audit frontend notices
        run: uv run python tools/generate_frontend_notices.py --check
      - name: Build UI bundle (ships inside the wheel, NFR-03)
        run: npm run build
        working-directory: ui
      - name: Build sdist + wheel
        run: uv build --clear
      - name: Smoke the exact release artifacts
        run: uv run python tools/smoke_release_artifact.py dist
      - name: Release notes for this tag
        if: github.ref_type == 'tag'
        # every v0.x is experimental (D33) — notes lead with the honest
        # developer-preview posture (PLAN M0), then the git-cliff body
        run: |
          uvx git-cliff --latest --strip header -o CLIFF_BODY.md
          case "$GITHUB_REF_NAME" in
            v0.*) cat docs/release-notes-preamble-v0.md CLIFF_BODY.md > RELEASE_NOTES.md ;;
            *) mv CLIFF_BODY.md RELEASE_NOTES.md ;;
          esac
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
      - uses: actions/upload-artifact@v7
        if: github.ref_type == 'tag'
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  # Trusted publishing (OIDC): PyPI trusts this repo+workflow+environment,
  # no API tokens anywhere. Isolated job so only it holds id-token: write
  # and no build/test code runs next to the publish credential.
  pypi:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/napflow/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      # pinned exact like setup-uv; bump deliberately
      - uses: pypa/gh-action-pypi-publish@v1.14.0

  # After PyPI on purpose: a failed publish must not leave a public
  # Release page implying the version is installable.
  github-release:
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [build, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@v8
        with:
          name: release-notes
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # every v0.x is experimental (D33) — mark it a pre-release
          case "$GITHUB_REF_NAME" in
            v0.*) prerelease="--prerelease" ;;
            *) prerelease="" ;;
          esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md \
            $prerelease
